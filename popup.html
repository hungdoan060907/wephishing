<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --primary: #2563eb;
        --scam: #ef4444;
        --warning: #f59e0b;
        --safe: #10b981;
        --bg: #ffffff;
        --text: #1e293b;
      }

      body {
        width: 320px;
        padding: 16px;
        font-family: 'Inter', -apple-system, sans-serif;
        background: #f8fafc;
        margin: 0;
        color: var(--text);
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      .header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        color: #0f172a;
      }

      .shield-icon {
        color: var(--primary);
      }

      .result {
        padding: 16px;
        border-radius: 12px;
        background: white;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
      }

      /* Trạng thái nguy hiểm */
      .scam {
        background: #fef2f2;
        border-color: #fee2e2;
      }
      .scam .status-title { color: var(--scam); font-weight: bold; }

      /* Trạng thái cảnh báo */
      .dangerous {
        background: #fffbeb;
        border-color: #fef3c7;
      }
      .dangerous .status-title { color: var(--warning); font-weight: bold; }

      /* Trạng thái an toàn */
      .safe {
        background: #f0fdf4;
        border-color: #dcfce7;
      }
      .safe .status-title { color: var(--safe); font-weight: bold; }

      .url {
        font-size: 11px;
        color: #64748b;
        word-break: break-all;
        margin-top: 10px;
        padding: 8px;
        background: rgba(0,0,0,0.03);
        border-radius: 6px;
        font-family: monospace;
      }

      button {
        width: 100%;
        margin-top: 16px;
        background: var(--primary);
        border: none;
        color: white;
        padding: 10px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      button:hover {
        opacity: 0.9;
      }

      .footer {
        font-size: 11px;
        text-align: center;
        color: #94a3b8;
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #e2e8f0;
      }

      .status-title {
        display: block;
        margin-bottom: 4px;
        font-size: 14px;
      }
    </style>
    <title>Trình Bảo Vệ Duyệt Web</title>
  </head>
  <body>
    <div class="header">
      <svg class="shield-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      <h3>Trình Bảo Vệ Duyệt Web</h3>
    </div>

    <div id="result" class="result">
      <div style="text-align: center; color: #64748b;">Đang phân tích dữ liệu...</div>
    </div>

    <button id="refreshBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
      Quét lại trang này
    </button>

    <div class="footer">
      Bảo mật thời gian thực & lọc URL độc hại<br />
      Tự động ngăn chặn các mối đe dọa trực tuyến
    </div>
    
    <script src="popup.js"></script>
  </body>
</html>
